services:
  # ── Producer (Web Service — exposes /enqueue and /health) ─────────────────
  - type: web
    name: workqueue-producer
    runtime: python
    rootDir: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn producer:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        sync: false          # set manually in Render dashboard (keeps secret safe)
      - key: PORT_PRODUCER
        value: 8080

  # ── Worker (Web Service to stay on Free Tier — no credit card needed) ───────
  - type: web
    name: workqueue-worker
    plan: free
    runtime: python
    rootDir: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn worker:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REDIS_URL
        sync: false
      - key: PORT_WORKER
        value: 8081
